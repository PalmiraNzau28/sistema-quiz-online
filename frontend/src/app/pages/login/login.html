<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h3 class="text-center">{{ 'login.title' | translate }}</h3>
      </div>
      <div class="card-body">
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">{{ 'login.email' | translate }}</label>
            <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">{{ 'login.password' | translate }}</label>
            <input type="password" class="form-control" [(ngModel)]="password" name="password" required>
          </div>
          
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>
          
          <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
            {{ loading ? ( 'login.loading' | translate ) : ( 'login.button' | translate ) }}
          </button>
        </form>
        
        <div class="text-center mt-3">
          <a routerLink="/register">{{ 'login.registerLink' | translate }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
