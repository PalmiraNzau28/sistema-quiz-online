<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <h3 class="text-center">{{ isEditMode ? ('quizForm.edit' | translate) : ('quizForm.create' | translate) }}</h3>
      </div>
      <div class="card-body">
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">{{ 'quizForm.title' | translate }}</label>
            <input type="text" class="form-control" [(ngModel)]="title" name="title" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">{{ 'quizForm.description' | translate }}</label>
            <textarea class="form-control" rows="3" [(ngModel)]="description" name="description"></textarea>
          </div>
          
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>
          
          <div class="d-flex justify-content-between">
            <button type="button" class="btn btn-secondary" routerLink="/quizzes">{{ 'quizForm.cancel' | translate }}</button>
            <button type="submit" class="btn btn-primary" [disabled]="loading">
              {{ loading ? ( 'quizForm.saving' | translate ) : ( isEditMode ? ( 'quizForm.update' | translate ) : ( 'quizForm.save' | translate ) ) }}
            </button>
          </div>
        </form>
        
        <!-- Secção de importação da API (apenas para novos quizzes) -->
        <div class="mt-4" *ngIf="!isEditMode">
          <hr>
          <h5>{{ 'quizForm.importFromAPI' | translate }}</h5>
          <div class="row g-2">
            <div class="col-md-5">
              <select class="form-control" [(ngModel)]="apiCategory" name="apiCategory">
                <option value="">{{ 'quizForm.anyCategory' | translate }}</option>
                <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
              </select>
            </div>
            <div class="col-md-3">
              <select class="form-control" [(ngModel)]="apiDifficulty" name="apiDifficulty">
                <option value="">{{ 'quizForm.anyDifficulty' | translate }}</option>
                <option value="easy">{{ 'quizForm.easy' | translate }}</option>
                <option value="medium">{{ 'quizForm.medium' | translate }}</option>
                <option value="hard">{{ 'quizForm.hard' | translate }}</option>
              </select>
            </div>
            <div class="col-md-2">
              <input type="number" class="form-control" [(ngModel)]="apiAmount" name="apiAmount" min="1" max="10" placeholder="5">
            </div>
            <div class="col-md-2">
              <button type="button" class="btn btn-info w-100" (click)="importFromAPI()" [disabled]="importing">
                {{ importing ? ( 'quizForm.importing' | translate ) : ( 'quizForm.importQuestions' | translate ) }}
              </button>
            </div>
          </div>
          <div *ngIf="apiMessage" class="alert alert-info mt-2">{{ apiMessage }}</div>
        </div>
      </div>
    </div>
  </div>
</div>
