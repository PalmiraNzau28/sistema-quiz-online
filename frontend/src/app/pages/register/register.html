<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h3 class="text-center">{{ 'register.title' | translate }}</h3>
      </div>
      <div class="card-body">
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">{{ 'register.name' | translate }}</label>
            <input type="text" class="form-control" [(ngModel)]="name" name="name" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">{{ 'register.email' | translate }}</label>
            <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">{{ 'register.password' | translate }}</label>
            <input type="password" class="form-control" [(ngModel)]="password" name="password" required>
            <small class="text-muted">{{ 'register.passwordHint' | translate }}</small>
          </div>
          
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>
          
          <div *ngIf="successMessage" class="alert alert-success">
            {{ successMessage }}
          </div>
          
          <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
            {{ loading ? ( 'register.loading' | translate ) : ( 'register.button' | translate ) }}
          </button>
        </form>
        
        <div class="text-center mt-3">
          <a routerLink="/login">{{ 'register.loginLink' | translate }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
